<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Radiology Roster</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#0f1117;--surface:#181c24;--surface2:#1f2430;--border:#2a3040;
  --tl:#1D9E75;--tll:#0d3327;--tlt:#5DCAA5;
  --am:#BA7517;--aml:#2d1f05;--amt:#EF9F27;
  --re:#A32D2D;--rel:#2a0d0d;--ret:#F09595;
  --pu:#534AB7;--pul:#1a1640;--put:#AFA9EC;
  --bl:#185FA5;--bll:#0a1f3d;--blt:#85B7EB;
  --gr:#3B6D11;--grl:#111f05;--grt:#97C459;
  --tx:#e8eaf0;--txs:#8892a4;--txm:#b0bac8;
  --r6:6px;--r10:10px;--r14:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px;line-height:1.5}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:15px;font-weight:600;letter-spacing:.01em}
.topbar-sub{font-size:11px;color:var(--txs);margin-top:1px}
.sync-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--txs);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
.sync-btn:active{background:var(--surface2);color:var(--tlt)}
.sync-btn.spinning{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.content{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
.nav{display:flex;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.nav-btn{flex:1;border:none;background:transparent;color:var(--txs);padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:9px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;transition:color .15s}
.nav-btn svg{width:20px;height:20px;stroke-width:1.8;fill:none;stroke:currentColor}
.nav-btn.active{color:var(--tlt)}
.nav-btn.active svg{stroke:var(--tl)}
.section{display:none;flex-direction:column;gap:12px}
.section.active{display:flex}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r14);padding:14px}
.card-title{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--txs);margin-bottom:10px}
.card-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border)}
.card-row:last-child{border-bottom:none}
.card-row-label{font-size:12px;color:var(--txs)}
.card-row-val{font-size:13px;font-weight:500}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.02em}
.badge-night{background:var(--pul);color:var(--put)}
.badge-fri{background:var(--aml);color:var(--amt)}
.badge-pre{background:var(--surface2);color:var(--txs)}
.badge-ok{background:var(--tll);color:var(--tlt)}
.badge-warn{background:var(--aml);color:var(--amt)}
.badge-fail{background:var(--rel);color:var(--ret)}

/* ── STATION PILLS ── */
.st{display:inline-flex;align-items:center;padding:3px 8px;border-radius:var(--r6);font-size:11px;font-weight:600}
.st-ct  {background:rgba(168,59,29,.25);color:#F0997B}
.st-mri {background:rgba(83,74,183,.25);color:#AFA9EC}
.st-u8  {background:rgba(59,109,17,.25);color:#97C459}
.st-u91 {background:rgba(24,95,165,.25);color:#85B7EB}
.st-u92 {background:rgba(29,158,117,.25);color:#5DCAA5}
.st-off {background:var(--surface2);color:var(--txs)}

/* ── DOCTOR AVATARS ── */
.avatar{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.avatar-sm{width:22px;height:22px;font-size:8px}
.av0{background:#0d3327;color:#5DCAA5}.av1{background:#1a1640;color:#AFA9EC}
.av2{background:#2a0e05;color:#F0997B}.av3{background:#0a1f3d;color:#85B7EB}
.av4{background:#2d1f05;color:#EF9F27}.av5{background:#111f05;color:#97C459}
.av6{background:#2a0d0d;color:#F09595}

/* ── TODAY HERO ── */
.hero{background:linear-gradient(135deg,var(--tll) 0%,var(--surface) 100%);border:1px solid var(--tl);border-radius:var(--r14);padding:16px}
.hero-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tlt);margin-bottom:6px}
.hero-name{font-size:20px;font-weight:700;color:var(--tx)}
.hero-time{font-size:12px;color:var(--txs);margin-top:3px}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat-card{background:var(--surface2);border-radius:var(--r10);padding:12px;text-align:center}
.stat-num{font-size:24px;font-weight:700;margin-bottom:2px}
.stat-label{font-size:10px;color:var(--txs);font-weight:500;letter-spacing:.04em}

/* ── STATION ROWS ── */
.st-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.st-row:last-child{border-bottom:none}
.st-row-left{display:flex;align-items:center;gap:8px}
.st-row-doc{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500}

/* ── NIGHT LIST ── */
.night-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.night-item:last-child{border-bottom:none}
.night-date{font-size:12px;color:var(--txs)}
.night-doc{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500}

/* ── CALENDAR ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav h3{font-size:15px;font-weight:600}
.cal-arrow{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--tx);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dayname{text-align:center;font-size:9px;font-weight:600;color:var(--txs);padding:6px 0;letter-spacing:.04em}
.cal-cell{border-radius:var(--r6);padding:4px 3px;min-height:58px;background:var(--surface2);cursor:pointer;transition:background .15s;position:relative}
.cal-cell:active{background:var(--surface)}
.cal-cell.today{outline:2px solid var(--tl);outline-offset:-2px}
.cal-cell.other-month{opacity:.3}
.cal-cell.weekend{background:rgba(255,255,255,.02)}
.cal-num{font-size:10px;font-weight:600;color:var(--txs);text-align:center;margin-bottom:2px}
.cal-num.today-num{color:var(--tl)}
.cal-chip{font-size:8px;padding:1px 3px;border-radius:2px;margin-bottom:1px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.cc-n{background:rgba(83,74,183,.4);color:#CECBF6}
.cc-24{background:rgba(29,158,117,.35);color:#5DCAA5}
.cal-cell.cal-24hr{background:rgba(29,158,117,.07);border:1px solid rgba(29,158,117,.2)}
.cc-f{background:rgba(186,117,23,.4);color:#EF9F27}
.cc-p{background:rgba(42,48,64,.8);color:#8892a4}
.cc-ct {background:rgba(168,59,29,.35);color:#F0997B}
.cc-mri{background:rgba(83,74,183,.35);color:#AFA9EC}
.cc-u8 {background:rgba(59,109,17,.35);color:#97C459}
.cc-u91{background:rgba(24,95,165,.35);color:#85B7EB}
.cc-u92{background:rgba(29,158,117,.35);color:#5DCAA5}
.cc-lv {background:rgba(163,45,45,.4);color:#F09595}
.cal-filter{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.cf-btn{font-size:10px;padding:4px 8px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--txs);cursor:pointer;transition:all .15s;white-space:nowrap}
.cf-btn.active{border-color:var(--tl);background:var(--tll);color:var(--tlt)}

/* ── QC TABLE ── */
.qc-table{width:100%;border-collapse:collapse;font-size:11px}
.qc-table th{text-align:left;padding:6px 8px;color:var(--txs);font-size:10px;font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap}
.qc-table td{padding:6px 8px;border-bottom:1px solid var(--border)}
.qc-table tr:last-child td{border-bottom:none}
.qc-ok{color:var(--tlt)}.qc-warn{color:var(--amt)}.qc-fail{color:var(--ret)}

/* ── LEAVES FORM ── */
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.form-group label{font-size:11px;font-weight:600;color:var(--txs);letter-spacing:.04em}
.form-group select,.form-group input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r10);color:var(--tx);padding:10px 12px;font-size:13px;width:100%;outline:none;-webkit-appearance:none}
.form-group select:focus,.form-group input:focus{border-color:var(--tl)}
.btn-primary{width:100%;background:var(--tl);color:#fff;border:none;border-radius:var(--r10);padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-primary:active{opacity:.85}
.btn-danger{background:var(--re);color:var(--ret);border:none;border-radius:var(--r6);padding:4px 10px;font-size:11px;cursor:pointer}

/* ── LEAVE ITEM ── */
.leave-item{background:var(--surface2);border-radius:var(--r10);padding:10px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.leave-info{flex:1;min-width:0}
.leave-doc{font-size:13px;font-weight:600;margin-bottom:2px}
.leave-meta{font-size:11px;color:var(--txs)}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:32px 16px;color:var(--txs)}
.empty-icon{font-size:36px;margin-bottom:8px}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--txs);gap:10px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--tl);border-radius:50%;animation:spin 1s linear infinite}

/* ── TOAST ── */
.toast-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;gap:6px;align-items:center}
.toast{background:#1f2430;border:1px solid var(--tl);border-radius:20px;padding:8px 18px;font-size:12px;font-weight:500;color:var(--tlt);white-space:nowrap;animation:fadeIn .2s ease}
.toast.err{border-color:var(--re);color:var(--ret)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ── SETUP SCREEN ── */
.setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:24px;text-align:center;gap:16px}
.setup h2{font-size:20px;font-weight:700}
.setup p{font-size:13px;color:var(--txs);line-height:1.7;max-width:340px}
.setup input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r10);color:var(--tx);padding:12px 14px;font-size:13px;outline:none}
.setup input:focus{border-color:var(--tl)}

/* scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- SETUP SCREEN (shown until API URL is saved) -->
<div class="setup" id="setup-screen">
  <div style="font-size:48px">🏥</div>
  <h2>Radiology Roster</h2>
  <p>Paste your Google Apps Script Web App URL below to connect to the roster database.</p>
  <input type="url" id="api-url-input" placeholder="https://script.google.com/macros/s/..." autocomplete="off" spellcheck="false">
  <button class="btn-primary" onclick="saveApiUrl()" style="max-width:340px">Connect</button>
  <p style="font-size:11px;color:var(--txs)">Get this URL from Apps Script → Deploy → Manage deployments</p>
</div>

<!-- MAIN APP -->
<div class="app" id="main-app" style="display:none">
  <div class="topbar">
    <div>
      <div class="topbar h1" id="topbar-title" style="font-size:15px;font-weight:600">Radiology Roster</div>
      <div class="topbar-sub" id="topbar-date"></div>
    </div>
    <button class="sync-btn" id="sync-btn" onclick="loadData()" title="Sync">↻</button>
  </div>

  <div class="content" id="content">
    <!-- DASHBOARD -->
    <div id="sec-dashboard" class="section active">
      <div id="dash-content"><div class="loading"><div class="spinner"></div> Loading roster…</div></div>
    </div>

    <!-- CALENDAR -->
    <div id="sec-calendar" class="section">
      <div class="card">
        <div class="cal-filter" id="cal-filter"></div>
        <div class="cal-nav">
          <button class="cal-arrow" onclick="calMove(-1)">‹</button>
          <h3 id="cal-title"></h3>
          <button class="cal-arrow" onclick="calMove(1)">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>

    <!-- NIGHT ROSTER — full month calendar -->
    <div id="sec-night" class="section">
      <div class="card" style="padding:10px">
        <div class="cal-nav" style="margin-bottom:8px">
          <button class="cal-arrow" onclick="nightCalMove(-1)">‹</button>
          <h3 id="night-cal-title" style="font-size:14px"></h3>
          <button class="cal-arrow" onclick="nightCalMove(1)">›</button>
        </div>
        <div class="cal-grid" id="night-cal-grid"></div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;font-size:10px">
          <span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#3C3489;display:inline-block"></span>Night Cal</span>
          <span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:#BA7517;display:inline-block"></span>Fri★/Mon★</span>
          <span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;border-radius:2px;background:var(--tl);display:inline-block"></span>24hr</span>
          
        </div>
      </div>
    </div>

    <!-- QC -->
    <div id="sec-qc" class="section">
      <div class="card" id="qc-content"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <!-- LEAVES -->
    <div id="sec-leaves" class="section">
      <div class="card">
        <div class="card-title">Add Leave or Exchange</div>
        <div class="form-group">
          <label>TYPE</label>
          <select id="lv-type" onchange="toggleExField()">
            <option value="Day Leave">Day Leave</option>
            <option value="Night Exchange">Night Exchange</option>
          </select>
        </div>
        <div class="form-group">
          <label>DOCTOR</label>
          <select id="lv-doc"></select>
        </div>
        <div class="form-group">
          <label>DATE</label>
          <input type="date" id="lv-date">
        </div>
        <div id="ex-fields" style="display:none">
          <div class="form-group">
            <label>EXCHANGE WITH</label>
            <select id="lv-ex-doc"></select>
          </div>
          <div class="form-group">
            <label>EXCHANGE DATE</label>
            <input type="date" id="lv-ex-date">
          </div>
        </div>
        <div class="form-group">
          <label>REASON (optional)</label>
          <input type="text" id="lv-reason" placeholder="Family function, sick leave…">
        </div>
        <button class="btn-primary" onclick="submitLeave()">Submit Request</button>
      </div>
      <div class="card">
        <div class="card-title">Logged Requests</div>
        <div id="leaves-list"></div>
      </div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="switchTab('dashboard')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Today
    </button>
    <button class="nav-btn" id="nav-calendar" onclick="switchTab('calendar')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
      Calendar
    </button>
    <button class="nav-btn" id="nav-night" onclick="switchTab('night')">
      <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      Night
    </button>
    <button class="nav-btn" id="nav-qc" onclick="switchTab('qc')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      QC
    </button>
    <button class="nav-btn" id="nav-leaves" onclick="switchTab('leaves')">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      Leaves
    </button>
  </nav>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const DOCS=['Ajith','Akash','Amal','Stinson','Linta','Balasankar','Gouri'];
const STATIONS=['CT','MRI 10:30','USG 8am','USG 9/1','USG 9/2'];
const DOC_INIT=['AJ','AK','AM','ST','LI','BS','GO'];
const ST_CLS=['st-ct','st-mri','st-u8','st-u91','st-u92'];
const CAL_CLS=['cc-ct','cc-mri','cc-u8','cc-u91','cc-u92'];

let API_URL = localStorage.getItem('rosterApiUrl') || '';
let DATA = null;
let calOffset = 0, nightWk = 0;

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg=>{
      // Force update check on every load
      reg.update();
    });
    // When a new SW takes over, reload to get fresh content
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      window.location.reload();
    });
  }
  setTopbarDate();
  if (API_URL) {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('main-app').style.display    = 'flex';
    loadData();
    requestNotificationPermission();
  }
  populateDocSelects();
  document.getElementById('lv-date').value = today();
  document.getElementById('lv-ex-date').value = today();
  // Check URL param for forced refresh
  if(new URLSearchParams(window.location.search).get('refresh')){
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations().then(regs=>{
        regs.forEach(r=>r.unregister());
      }).then(()=>window.location.replace(window.location.pathname));
    }
  }
});

// ── DATE HELPERS ─────────────────────────────────────────────
// All lookups use real date keys directly from the API response.
// No cycle-mapping needed on the frontend — the backend returns
// night/day objects keyed by actual yyyy-MM-dd dates.

function today(){
  // IST date string
  return new Date().toLocaleDateString('en-CA', {timeZone:'Asia/Kolkata'});
}
function addD(d,n){ return new Date(d.getTime()+n*86400000); } // UTC-safe day addition
function dKey(d){
  // yyyy-MM-dd in IST
  return d.toLocaleDateString('en-CA', {timeZone:'Asia/Kolkata'});
}
function DOW(d){ return d.getDay(); }

// Direct lookup — no cycle key transformation needed
function getNight(d){ return DATA?.night?.[dKey(d)]||null; }
function getDayA(d){ return DATA?.day?.[dKey(d)]||null; }
function getLeaveIds(dateStr){
  const lv=DATA?.leaves||[];
  return new Set(lv.filter(l=>l.type==='Day Leave'&&l.date===dateStr).map(l=>DOCS.indexOf(l.doctor)).filter(i=>i>=0));
}
function getCycleStart(){ return DATA?.cycleStart||today(); }
function getCycleEnd(){   return DATA?.cycleEnd||today(); }
function setTopbarDate(){
  const d=new Date();
  document.getElementById('topbar-date').textContent=d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}

// ── API ───────────────────────────────────────────────────────
function saveApiUrl(){
  const url=document.getElementById('api-url-input').value.trim();
  if(!url.startsWith('https://')){ toast('Enter a valid URL','err'); return; }
  localStorage.setItem('rosterApiUrl',url);
  API_URL=url;
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('main-app').style.display='flex';
  loadData();
  requestNotificationPermission();
}

async function loadData(){
  const btn=document.getElementById('sync-btn');
  btn.classList.add('spinning');
  try {
    const res=await fetch(API_URL+'?action=all&t='+Date.now());
    DATA=await res.json();
    if(DATA.error) throw new Error(DATA.error);
    localStorage.setItem('rosterCache',JSON.stringify(DATA));
    renderDashboard();
    renderCalendar();
    renderNightRoster();
    renderQC();
    renderLeaves();
    cachePostings();
    toast('Synced ✓');
  } catch(e) {
    // Try cache
    const cached=localStorage.getItem('rosterCache');
    if(cached){ DATA=JSON.parse(cached); renderDashboard(); renderCalendar(); renderNightRoster(); renderQC(); renderLeaves(); }
    toast('Offline — showing cached data','err');
  } finally {
    btn.classList.remove('spinning');
  }
}

// ── DASHBOARD ─────────────────────────────────────────────────
function renderDashboard(){
  if(!DATA){ return; }
  const now=new Date();
  // Tonight's night duty person
  const nd=getNight(now);
  // Pre-duty off = person who has night duty TONIGHT (they skip day work today)
  const pre=nd;
  // Post-duty off = person who did duty LAST NIGHT (night started yesterday 4:30pm)
  // They are resting today after their night ends at 8:30am
  const post=getNight(addD(now,-1));
  // Also check if yesterday was a Sunday/holiday 24hr duty (same post-off logic)
  const yday=addD(now,-1), ydayKey=dKey(yday);
  const yesterdayWas24hr=DATA?.day?.[ydayKey]?.is24hr;
  const dateStr=dKey(now), da=getDayA(now), leaves=getLeaveIds(dateStr);
  const DNAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let h='';

  // Tonight hero
  const fm=nd&&(nd.type==='fri'||nd.type==='mon');
  h+=`<div class="hero">
    <div class="hero-label">Tonight's Night Duty</div>
    <div class="hero-name">${nd?DOCS[nd.doc]:'— Holiday / Off'}</div>

  </div>`;

  // Pre/Post off
  h+=`<div class="g2">
    <div class="card"><div class="card-title">Pre-Duty Off</div>
      ${pre?`<div style="display:flex;align-items:center;gap:8px">${avEl(pre.doc)}<span style="font-weight:600">${DOCS[pre.doc]}</span></div>`:'<span style="color:var(--txs)">None</span>'}
    </div>
    <div class="card"><div class="card-title">Post-Duty Off</div>
      ${post?`<div style="display:flex;align-items:center;gap:8px">${avEl(post.doc)}<span style="font-weight:600">${DOCS[post.doc]}</span></div>`:yesterdayWas24hr?`<div style="color:var(--txs);font-size:12px">24hr duty person (see last night)</div>`:'<span style="color:var(--txs)">None</span>'}
    </div>
  </div>`;

  // Day stations
  h+=`<div class="card"><div class="card-title">Today's Day Stations</div>`;
  if(da&&da.activeStations&&da.activeStations.length){
    da.activeStations.forEach(st=>{
      const docIdx=da.assign[st], onLv=leaves.has(docIdx), sc=stClass(st);
      h+=`<div class="st-row">
        <div class="st-row-left"><span class="st ${sc}">${st}</span></div>
        <div class="st-row-doc">${avEl(docIdx,true)}<span${onLv?' style="color:var(--ret)"':''}>${DOCS[docIdx]}${onLv?' ⚠ LEAVE':''}</span></div>
      </div>`;
    });
    if(da.availCount<5) h+=`<div style="margin-top:8px;font-size:11px;color:var(--amt)">⚠ ${5-da.availCount} unavailable — ${5-da.activeStations.length} station(s) closed</div>`;
  } else {
    h+=`<div style="color:var(--txs);font-size:13px">Not a working day</div>`;
  }
  h+=`</div>`;

  // Next 7 nights
  h+=`<div class="card"><div class="card-title">Next 7 Nights</div>`;
  for(let i=0;i<7;i++){
    const d=addD(now,i), nd2=getNight(d); if(!nd2) continue;
    const fm2=nd2.type==='fri'||nd2.type==='mon';
    h+=`<div class="night-item">
      <div><div class="night-date">${DNAMES[DOW(d)]} ${d.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]}</div></div>
      <div class="night-doc">${avEl(nd2.doc,true)}<span>${DOCS[nd2.doc]}</span></div>
    </div>`;
  }
  h+=`</div>`;

  // Duty balance — show completed / total / remaining
  const todayStr=dKey(new Date());
  const cntDone=Array(7).fill(0), cntTotal=Array(7).fill(0);
  if(DATA.night) Object.entries(DATA.night).forEach(([dk,v])=>{
    cntTotal[v.doc]++; if(dk<=todayStr) cntDone[v.doc]++;
  });
  h+=`<div class="card"><div class="card-title">Duty Balance — 7-Week Cycle (done / total)</div><div class="g3" style="gap:6px;margin-top:2px">`;
  DOCS.forEach((doc,i)=>{
    const rem=cntTotal[i]-cntDone[i];
    h+=`<div class="stat-card">${avEl(i)}<div class="stat-num" style="font-size:16px;margin-top:4px">${cntDone[i]}/${cntTotal[i]}</div><div class="stat-label">${doc}</div><div style="font-size:9px;color:var(--txs)">${rem} left</div></div>`;
  });
  h+=`</div></div>`;

  document.getElementById('dash-content').innerHTML=h;
}

function avEl(i,sm=false){
  return `<span class="avatar${sm?' avatar-sm':''} av${i}">${DOC_INIT[i]}</span>`;
}
function stClass(st){
  const idx=STATIONS.indexOf(st); return idx>=0?ST_CLS[idx]:'st-off';
}
function calChipClass(st){

}

// ── CALENDAR ─────────────────────────────────────────────────
// calView: 'all' | 'night' | 'day' | number (docIdx)
let calView = 'all';

function renderCalendar(){
  const today=new Date(), ref=new Date(today.getFullYear(),today.getMonth()+calOffset,1);
  const yr=ref.getFullYear(), mo=ref.getMonth();
  document.getElementById('cal-title').textContent=ref.toLocaleDateString('en-IN',{month:'long',year:'numeric'});

  // View mode filter buttons
  const modes=[{val:'all',label:'All'},{val:'day',label:'Day only'}];
  let fh=modes.map(m=>`<button class="cf-btn${calView===m.val?' active':''}" onclick="calView='${m.val}';renderCalendar()">${m.label}</button>`).join('');
  fh+='<span style="color:var(--txs);font-size:10px;padding:4px 2px 0;align-self:center"> | </span>';
  DOCS.forEach((d,i)=>{ fh+=`<button class="cf-btn${calView===i?' active':''}" onclick="calView=${i};renderCalendar()">${d}</button>`; });
  document.getElementById('cal-filter').innerHTML=fh;

  const first=new Date(yr,mo,1), startOff=(DOW(first)+6)%7;
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const DNAMES=['Mo','Tu','We','Th','Fr','Sa','Su'];
  let g=DNAMES.map(n=>`<div class="cal-dayname">${n}</div>`).join('');
  for(let i=0;i<startOff;i++) g+=`<div class="cal-cell other-month"></div>`;

  for(let day=1;day<=daysInMonth;day++){
    const date=new Date(yr,mo,day), dw=DOW(date);
    const isToday=date.toDateString()===today.toDateString();
    const dateStr=dKey(date);
    const nd=getNight(date), da=getDayA(date), leaveIds=getLeaveIds(dateStr);
    const postNd=getNight(addD(date,-1));
    const docFilter=typeof calView==='number'?calView:-1;
    const is24=nd?.type==='sun';

    let chips='';

    // Night chip
    const showNight=calView==='all'||calView==='night'||docFilter===nd?.doc;
    if(nd&&showNight&&(docFilter===-1||docFilter===nd.doc)){
      const isFM=nd.type==='fri'||nd.type==='mon';
      const cls=is24?'cc-24':isFM?'cc-f':'cc-n';
      const lbl=is24?'24h ':isFM?(nd.type==='fri'?'F\u2605 ':'M\u2605 '):'N ';
      chips+=`<span class="cal-chip ${cls}">${lbl}${DOCS[nd.doc].slice(0,4)}</span>`;
    }

    // Pre/post off (per-doctor view only)
    if(docFilter!==-1&&calView!=='night'){
      if(nd?.doc===docFilter) chips+=`<span class="cal-chip cc-p" style="font-size:7px">pre-off</span>`;
      else if(postNd?.doc===docFilter) chips+=`<span class="cal-chip cc-p" style="font-size:7px">post-off</span>`;
    }

    // Day station chips
    const showDay=calView==='all'||calView==='day'||typeof calView==='number';
    if(da&&showDay&&calView!=='night'){
      if(da.is24hr){
        // 24hr day — already shown in night chip
      } else if(docFilter===-1){
        da.activeStations?.forEach(st=>{
          const di=da.assign[st];
          chips+=`<span class="cal-chip ${calChipClass(st)}">${st.replace(' 10:30','').replace(' 8am','8')} ${DOCS[di].slice(0,3)}</span>`;
        });
      } else {
        const st=da.docSt?.[docFilter];
        if(st) chips+=`<span class="cal-chip ${calChipClass(st)}">${st.replace(' 10:30','').replace(' 8am','8')}</span>`;
      }
    }

    // Leave chip
    if(calView!=='night'&&[...leaveIds].some(i=>docFilter===-1||i===docFilter))
      chips+=`<span class="cal-chip cc-lv">Lv</span>`;

    g+=`<div class="cal-cell${isToday?' today':''}${is24?' cal-24hr':dw===0||dw===6?' weekend':''}">
      <div class="cal-num${isToday?' today-num':''}">${day}</div>${chips}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML=g;
}
function calMove(dir){ calOffset+=dir; renderCalendar(); }

// ── NIGHT ROSTER ─────────────────────────────────────────────
function renderNightRoster(){
  if(!DATA?.night) return;
  const today=new Date(), todayKey=dKey(today);
  const ref=new Date(today.getFullYear(),today.getMonth()+nightCalOffset,1);
  const yr=ref.getFullYear(), mo=ref.getMonth();
  document.getElementById('night-cal-title').textContent=
    ref.toLocaleDateString('en-IN',{month:'long',year:'numeric'});

  // Doctor colors — full background fill for the cell
  const DOC_FILL=['#1e3a5f','#2d1f5e','#5c1a3a','#4a2500','#0d3d2e','#4a0f0f','#0a3d4a'];
  const DOC_BORDER=['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444','#06b6d4'];

  const SUNDAY_COLOR='#4a3a00';   // deep amber for Sunday/holiday cell
  const SUNDAY_BORDER='#fbbf24';  // bright yellow border

  const first=new Date(yr,mo,1), startOff=(DOW(first)+6)%7;
  const daysInMonth=new Date(yr,mo+1,0).getDate();
  const DNAMES=['Mo','Tu','We','Th','Fr','Sa','Su'];
  let g=DNAMES.map(n=>`<div class="cal-dayname">${n}</div>`).join('');
  for(let i=0;i<startOff;i++) g+=`<div class="cal-cell other-month"></div>`;

  for(let day=1;day<=daysInMonth;day++){
    const date=new Date(yr,mo,day);
    const dk2=dKey(date);
    const isToday=dk2===todayKey;
    const nd=getNight(date);
    const dw=DOW(date);
    const isSun=dw===0;
    const isHol=DATA.holidays?.includes(dk2);
    const is24=isSun||isHol;

    let cellStyle='', numStyle='', nameHtml='';

    if(nd){
      const di=nd.doc;
      if(is24){
        // Sunday/holiday: bright amber cell, doctor name in white
        cellStyle=`background:${SUNDAY_COLOR};border:2px solid ${SUNDAY_BORDER};`;
        numStyle=`color:${SUNDAY_BORDER};font-weight:800;`;
        nameHtml=`<div style="font-size:11px;font-weight:700;color:#fff;
          margin-top:2px;padding:1px 2px;line-height:1.3;
          word-break:break-word;overflow:hidden">${DOCS[di]}</div>`;
      } else {
        // Regular duty: fill entire cell with doctor color
        cellStyle=`background:${DOC_FILL[di%DOC_FILL.length]};border-color:${DOC_BORDER[di%DOC_BORDER.length]};`;
        numStyle=`color:rgba(255,255,255,.7);`;
        nameHtml=`<div style="font-size:11px;font-weight:700;color:#fff;
          margin-top:2px;padding:1px 2px;line-height:1.3;
          word-break:break-word;overflow:hidden">${DOCS[di]}</div>`;
      }
    } else if(is24){
      // Sunday/holiday with no assignment — show empty amber cell
      cellStyle=`background:${SUNDAY_COLOR};border:2px solid ${SUNDAY_BORDER};`;
      numStyle=`color:${SUNDAY_BORDER};font-weight:800;`;
    }

    const cls=`cal-cell${isToday?' today':''}`;
    g+=`<div class="${cls}" style="${cellStyle}">
      <div class="cal-num" style="${numStyle}${isToday?'text-decoration:underline;':''}">${day}</div>
      ${nameHtml}
    </div>`;
  }
  document.getElementById('night-cal-grid').innerHTML=g;
}
let nightCalOffset=0;
function nightCalMove(dir){ nightCalOffset+=dir; renderNightRoster(); }


// ── QC ────────────────────────────────────────────────────────
function renderQC(){
  const qc=DATA?.qc;
  if(!qc){
    document.getElementById('qc-content').innerHTML='<div class="empty"><div class="empty-icon" style="font-size:32px">📊</div><p style="margin-top:8px">Load data first</p></div>';
    return;
  }
  const N=qc.doctors?.length||7;
  const DOCS2=qc.doctors||DOCS;
  const ST2=qc.stations||STATIONS;

  // ── Night duty summary ──
  let h='<div class="card-title" style="margin-bottom:10px">Night Duty — 7-week cycle</div>';
  h+='<div style="overflow-x:auto"><table class="qc-table"><thead><tr>';
  h+='<th>Doctor</th><th>Duties</th><th>Block min</th><th>Block max</th><th>Sat</th><th>Sun</th><th>Fri★</th><th>Status</th></tr></thead><tbody>';
  DOCS2.forEach((doc,i)=>{
    const gb=qc.ngapsBlock?.[i]||[];
    const mn=gb.length?Math.min(...gb):'—';
    const mx=gb.length?Math.max(...gb):'—';
    const mnOk=typeof mn!=='number'||mn>=4;
    const mxOk=typeof mx!=='number'||mx<=14;
    const satOk=qc.nightSats?.[i]===1;
    const sunOk=qc.nightSuns?.[i]===1;
    const friOk=qc.nightPairs?.[i]===1;
    const allOk=mnOk&&mxOk&&satOk&&sunOk&&friOk&&qc.nightDuties?.[i]>=6&&qc.nightDuties?.[i]<=8;
    h+=`<tr><td>${avEl(i,true)} ${doc}</td>`;
    h+=`<td class="${qc.nightDuties?.[i]>=6&&qc.nightDuties?.[i]<=8?'qc-ok':'qc-fail'}" style="text-align:center;font-weight:600">${qc.nightDuties?.[i]}</td>`;
    h+=`<td class="${mnOk?'qc-ok':'qc-fail'}" style="text-align:center">${mn}</td>`;
    h+=`<td class="${mxOk?'qc-ok':'qc-warn'}" style="text-align:center">${mx}</td>`;
    h+=`<td class="${satOk?'qc-ok':'qc-warn'}" style="text-align:center">${qc.nightSats?.[i]}</td>`;
    h+=`<td class="${sunOk?'qc-ok':'qc-warn'}" style="text-align:center">${qc.nightSuns?.[i]}</td>`;
    h+=`<td class="${friOk?'qc-ok':'qc-warn'}" style="text-align:center">${qc.nightPairs?.[i]}</td>`;
    h+=`<td><span class="badge ${allOk?'badge-ok':'badge-warn'}">${allOk?'OK':'CHECK'}</span></td></tr>`;
  });
  h+='</tbody></table></div>';

  // ── Station allocation ──
  h+='<div class="card-title" style="margin:16px 0 8px">Day Station Allocation (count | min gap / max gap)</div>';
  h+='<div style="font-size:10px;color:var(--txs);margin-bottom:6px">Each cell: count on top, min→max gap in days below. Green = OK, red = violation.</div>';
  h+='<div style="overflow-x:auto"><table class="qc-table"><thead><tr><th>Doctor</th>';
  ST2.forEach(st=>{ h+=`<th style="font-size:9px">${st.replace(' 10:30','MRI').replace(' 8am','USG8').replace('USG 9/','U9/')}</th>`; });
  h+='<th>Mon<br>USG8</th><th>Sat<br>MRI</th></tr></thead><tbody>';
  DOCS2.forEach((doc,i)=>{
    h+=`<tr><td>${avEl(i,true)} ${doc}</td>`;
    ST2.forEach((st,si)=>{
      const cnt=qc.stationCounts?.[i]?.[si]??'—';
      const g=qc.stationGaps?.[i]?.[si]||[];
      const mn=g.length?Math.min(...g):'—';
      const mx=g.length?Math.max(...g):'—';
      const gmin={CT:6,'MRI 10:30':6,'USG 8am':6,'USG 9/1':0,'USG 9/2':0}[st]||0;
      const ok=typeof mn!=='number'||mn>=gmin;
      h+=`<td class="${ok?'qc-ok':'qc-fail'}" style="text-align:center;font-size:11px">
        <div style="font-weight:600">${cnt}</div>
        <div style="font-size:9px;opacity:.7">${mn}/${mx}</div>
      </td>`;
    });
    const mu=qc.monUsg8?.[i]??'—';
    const sm=qc.satMri10?.[i]??'—';
    h+=`<td class="${mu>=1&&mu<=2?'qc-ok':mu===0?'qc-fail':'qc-warn'}" style="text-align:center;font-weight:600">${mu}</td>`;
    h+=`<td class="${sm>=1&&sm<=2?'qc-ok':sm===0?'qc-fail':'qc-warn'}" style="text-align:center;font-weight:600">${sm}</td>`;
    h+='</tr>';
  });
  // Totals row
  h+='<tr style="background:var(--surface2)"><td style="font-weight:600">TOTAL</td>';
  ST2.forEach((_,si)=>{
    const total=(qc.stationCounts||[]).reduce((a,c)=>a+(c?.[si]||0),0);
    h+=`<td style="text-align:center;font-weight:600">${total}</td>`;
  });
  h+='<td></td><td></td></tr>';
  h+='</tbody></table></div>';

  // ── Violations ──
  const viol=[...(qc.nightViolations||[]),...(qc.stViolations||[])];
  if(viol.length){
    h+='<div class="al al-e" style="margin-top:12px"><strong>Violations:</strong><br>'+viol.join('<br>')+'</div>';
  } else {
    h+='<div class="al al-s" style="margin-top:12px">All rules satisfied — no violations detected.</div>';
  }

  // ── Imbalances ──
  if(qc.imbalances?.length){
    h+='<div class="al al-w" style="margin-top:8px"><strong>Imbalances (to settle next cycle):</strong><br>';
    h+=qc.imbalances.map(x=>x.doctor+': '+x.str).join('<br>')+'</div>';
  }
  if(qc.settlements?.length){
    h+='<div class="al al-s" style="margin-top:8px"><strong>Settled from prior cycle:</strong><br>';
    h+=qc.settlements.join('<br>')+'</div>';
  }

  document.getElementById('qc-content').innerHTML=h;
}

async function submitLeave(){
  const type=document.getElementById('lv-type').value;
  const doctor=document.getElementById('lv-doc').value;
  const date=document.getElementById('lv-date').value;
  const reason=document.getElementById('lv-reason').value;
  const exWith=document.getElementById('lv-ex-doc').value;
  const exDate=document.getElementById('lv-ex-date').value;
  if(!date){ toast('Select a date','err'); return; }
  try {
    const res=await fetch(API_URL,{method:'POST',body:JSON.stringify({
      action:'addLeave',type,doctor,date,reason,
      exchangeWith:type==='Night Exchange'?exWith:'',
      exchangeDate:type==='Night Exchange'?exDate:''
    })});
    const data=await res.json();
    if(!data.ok) throw new Error(data.error);
    document.getElementById('lv-reason').value='';
    toast('Request submitted — refreshing roster…');
    // Immediately reload data and recompute affected postings
    await loadData();
    // Show what changed for tomorrow
    highlightChanges(date);
    // Fire instant push to affected doctors via Apps Script
    notifyImmediateChange(date);
    // Check if my posting changed and alert me immediately
    showImmediateAlert(date);
  } catch(e){ toast('Error: '+e.message,'err'); }
}

function highlightChanges(affectedDate){
  if(!DATA) return;
  const da=getDayA(new Date(affectedDate+'T06:00:00Z'));
  if(!da||!da.activeStations) return;
  const names=da.activeStations.map(st=>`${st}: ${DOCS[da.assign[st]]}`).join(', ');
  toast('Updated stations for '+affectedDate+': '+names);
}

async function notifyImmediateChange(affectedDate){
  // Ask Apps Script to immediately send notifications for the affected date
  try {
    await fetch(API_URL,{method:'POST',body:JSON.stringify({
      action:'notifyDate', date:affectedDate, trigger:'immediate'
    })});
  } catch(e){ console.log('notify err',e); }
}

// ── NOTIFICATIONS ─────────────────────────────────────────────
// Strategy: 
//  1. Web Push via service worker — works even when app is closed
//  2. In-app local notification at 5pm and 6am using setTimeout
//  3. Immediate notification when leave/exchange is submitted

let myName = localStorage.getItem('rosterMyName') || '';

async function requestNotificationPermission(){
  if(!('Notification' in window)) return;
  // Ask for name first if not set
  if(!myName){
    myName = prompt('Enter your name (must match exactly as in roster):\n'+DOCS.join(', '));
    if(myName && DOCS.includes(myName)){
      localStorage.setItem('rosterMyName', myName);
    } else { myName=''; return; }
  }
  if(Notification.permission==='default'){
    await Notification.requestPermission();
  }
  if(Notification.permission==='granted'){
    scheduleLocalAlerts();
    registerServiceWorkerPush();
  }
}

function scheduleLocalAlerts(){
  // Schedule 5pm alert for tomorrow's posting, and 6am alert for today's posting
  // Runs in-browser — works when app is open or in background on Android
  scheduleDailyAt(17, 0, () => showMyPosting('tomorrow'));  // 5pm: tomorrow posting
  scheduleDailyAt( 6, 0, () => showMyPosting('today'));     // 6am: today posting
}

function scheduleDailyAt(hour, min, fn){
  function schedule(){
    const now=new Date();
    // Use IST
    const ist=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Kolkata'}));
    const next=new Date(ist);
    next.setHours(hour, min, 0, 0);
    if(next<=ist) next.setDate(next.getDate()+1);
    const ms=next-ist;
    setTimeout(()=>{ fn(); setInterval(fn, 86400000); }, ms);
  }
  schedule();
}

function showMyPosting(when){
  if(Notification.permission!=='granted') return;
  if(!myName||!DATA) return;
  const di=DOCS.indexOf(myName); if(di<0) return;
  const d=when==='today'?new Date():addD(new Date(),1);
  const dk=dKey(d);
  const nd=getNight(d), postNd=getNight(addD(d,-1)), da=getDayA(d);
  const onLeave=(DATA.leaves||[]).some(l=>l.type==='Day Leave'&&l.date===dk&&l.doctor===myName);
  let body='';
  if(onLeave)                body='You are on LEAVE.';
  else if(postNd?.doc===di)  body='Post-duty off. Rest day.';
  else if(nd?.doc===di)      body='PRE-DUTY OFF — Night duty 4:30pm.';
  else if(da?.docSt?.[di])   body='Day posting: '+da.docSt[di];
  else                        body='No specific posting.';
  if(nd?.doc===di&&!onLeave) body+=' | NIGHT DUTY tonight 4:30pm.';
  const title=when==='today'?'Roster — Today ('+dk+')':'Roster — Tomorrow ('+dk+')';
  if('serviceWorker' in navigator && navigator.serviceWorker.controller){
    navigator.serviceWorker.controller.postMessage({type:'SHOW_NOTIF',title,body,tag:'roster-'+when});
  } else {
    new Notification(title,{body,icon:'icon-192.png',tag:'roster-'+when});
  }
}

// Called immediately when leave/exchange is submitted
function showImmediateAlert(affectedDate){
  if(Notification.permission!=='granted'||!myName||!DATA) return;
  const di=DOCS.indexOf(myName); if(di<0) return;
  const d=new Date(affectedDate+'T06:00:00Z');
  const da=getDayA(d);
  if(!da) return;
  const oldPosting=localStorage.getItem('posting_'+affectedDate)||'';
  const newPosting=da.docSt?.[di]||'Off/Pre-off';
  if(oldPosting && oldPosting!==newPosting){
    const title='Roster changed — '+affectedDate;
    const body='Your posting changed: '+oldPosting+' → '+newPosting;
    new Notification(title,{body,icon:'icon-192.png',tag:'roster-change-'+affectedDate});
    toast('Your posting changed for '+affectedDate+': '+newPosting,'ok');
  }
  if(da.docSt?.[di]) localStorage.setItem('posting_'+affectedDate, da.docSt[di]);
}

// Cache today's and tomorrow's postings for change detection
function cachePostings(){
  if(!DATA||!myName) return;
  const di=DOCS.indexOf(myName); if(di<0) return;
  ['today','tomorrow'].forEach(when=>{
    const d=when==='today'?new Date():addD(new Date(),1);
    const dk=dKey(d), da=getDayA(d);
    if(da?.docSt?.[di]) localStorage.setItem('posting_'+dk, da.docSt[di]);
  });
}

async function registerServiceWorkerPush(){
  // Web Push requires a VAPID server — for this app we use in-browser only.
  // ntfy.sh app on phone is the recommended push channel (see setup guide).
  // The SW still handles in-app push messages via postMessage.
  if(!('serviceWorker' in navigator)) return;
  const reg = await navigator.serviceWorker.ready;
  // Listen for messages from SW
  navigator.serviceWorker.addEventListener('message', e=>{
    if(e.data?.type==='TRIGGER_REFRESH'){ loadData(); }
  });
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg,type='ok'){
  const wrap=document.getElementById('toast-wrap');
  const el=document.createElement('div');
  el.className='toast'+(type==='err'?' err':'');
  el.textContent=msg;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(),2800);
}
